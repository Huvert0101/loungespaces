<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lounge Spaces – Lobby</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');
    body { font-family: 'Nunito', sans-serif; background-color: #FDF8F5; }
    .shadow-cozy { box-shadow: 0 12px 40px -12px rgba(255,143,112,.25); }
    .card-room { transition: transform .2s, box-shadow .2s; }
    .card-room:hover { transform: translateY(-6px); box-shadow: 0 20px 50px -10px rgba(255,143,112,.3); }
    /* Modal */
    #modal-overlay { transition: opacity .2s; }
    #modal-box    { transition: transform .2s, opacity .2s; }
  </style>
</head>
<body class="min-h-screen text-slate-700 p-6 md:p-12">

  <!-- ── Header ── -->
  <header class="flex justify-between items-center mb-12 max-w-5xl mx-auto">
    <div class="flex items-center gap-4">
      <div class="w-14 h-14 bg-orange-400 rounded-3xl flex items-center justify-center text-white text-2xl shadow-cozy">🛋️</div>
      <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Lounge Spaces</h1>
    </div>
    <div class="flex items-center gap-3 bg-white py-2 px-4 rounded-full shadow-sm border border-orange-50">
      <span id="username-label" class="font-bold text-slate-600 hidden md:block">Hola, Cargando…</span>
      <img id="avatar-img" src="" alt="Tu Avatar" class="w-10 h-10 rounded-full border-2 border-orange-200">
    </div>
  </header>

  <!-- ── Main ── -->
  <main class="max-w-5xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-8 gap-4">
      <div>
        <h2 class="text-2xl font-bold text-slate-800 mb-1">Salas activas</h2>
        <p class="text-slate-500 font-semibold">Únete a una sala de voz y relájate en el entorno 3D.</p>
      </div>
      <button id="btn-create" class="bg-orange-500 hover:bg-orange-600 active:scale-95 transition-all text-white px-6 py-3 rounded-2xl font-bold shadow-cozy flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"/>
        </svg>
        Crear Sala
      </button>
    </div>

    <!-- Rooms grid -->
    <div id="rooms-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Cards injected by JS -->
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="hidden flex flex-col items-center py-24 text-slate-400">
      <span class="text-6xl mb-4">🌙</span>
      <p class="text-xl font-bold">No hay salas todavía.</p>
      <p class="font-semibold mt-1">¡Sé el primero en crear una!</p>
    </div>
  </main>

  <!-- ── Modal: Crear Sala ── -->
  <div id="modal-overlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none">
    <div id="modal-box" class="bg-white rounded-[2rem] shadow-2xl p-8 w-full max-w-md mx-4 scale-95 opacity-0">
      <h3 class="text-2xl font-extrabold text-slate-800 mb-6">✨ Nueva Sala</h3>

      <label class="block mb-1 font-bold text-slate-600">Nombre</label>
      <input id="inp-name" type="text" placeholder="Mi sala cozy…"
        class="w-full border-2 border-orange-100 focus:border-orange-400 rounded-2xl px-4 py-3 font-semibold outline-none mb-4 transition" />

      <label class="block mb-1 font-bold text-slate-600">Descripción <span class="font-normal text-slate-400">(opcional)</span></label>
      <input id="inp-desc" type="text" placeholder="De qué van a hablar…"
        class="w-full border-2 border-orange-100 focus:border-orange-400 rounded-2xl px-4 py-3 font-semibold outline-none mb-4 transition" />

      <label class="block mb-1 font-bold text-slate-600">Máx. usuarios</label>
      <select id="inp-max" class="w-full border-2 border-orange-100 focus:border-orange-400 rounded-2xl px-4 py-3 font-semibold outline-none mb-6 bg-white transition">
        <option value="4">4</option>
        <option value="6">6</option>
        <option value="8" selected>8</option>
        <option value="12">12</option>
      </select>

      <div id="modal-error" class="hidden text-red-500 font-semibold mb-4 text-sm"></div>

      <div class="flex gap-3">
        <button id="btn-modal-cancel" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-2xl py-3 font-bold transition">Cancelar</button>
        <button id="btn-modal-create" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white rounded-2xl py-3 font-bold shadow-cozy transition">Crear</button>
      </div>
    </div>
  </div>

  <script>
  // ─── User identity ───────────────────────────────────────────────────────
  const BG_COLORS = ['ffdfbf','b6e3f4','c0aede','ffd5dc','d1d4f9','a8e6cf'];
  let MY = JSON.parse(localStorage.getItem('cozy_me') || 'null');
  if (!MY) {
    const seeds = ['Felix','Luna','Max','Leo','Mia','Sam','Nova','Orion','Pixel','Zara'];
    MY = {
      username:  'User' + Math.floor(Math.random()*9000+1000),
      avatarSeed: seeds[Math.floor(Math.random()*seeds.length)],
      avatarBg:   BG_COLORS[Math.floor(Math.random()*BG_COLORS.length)]
    };
    localStorage.setItem('cozy_me', JSON.stringify(MY));
  }
  document.getElementById('username-label').textContent = 'Hola, ' + MY.username;
  document.getElementById('avatar-img').src =
    `https://api.dicebear.com/7.x/notionists/svg?seed=${MY.avatarSeed}&backgroundColor=${MY.avatarBg}`;

  // ─── Socket ──────────────────────────────────────────────────────────────
  const socket = io();

  socket.on('connect', () => {
    socket.emit('rooms:list', renderRooms);
  });

  socket.on('rooms:updated', renderRooms);

  // ─── Render rooms ────────────────────────────────────────────────────────
  function renderRooms(rooms) {
    const grid   = document.getElementById('rooms-grid');
    const empty  = document.getElementById('empty-state');
    grid.innerHTML = '';

    if (!rooms || rooms.length === 0) {
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    rooms.forEach(room => {
      const isFull = room.userCount >= room.maxUsers;
      const card = document.createElement('div');
      card.className = 'card-room bg-white p-6 rounded-[2rem] shadow-cozy border border-orange-50 cursor-pointer relative overflow-hidden';
      card.dataset.roomId = room.id;

      // Pick a hue for the decorative blob
      const hues = ['orange','blue','purple','green','rose','sky'];
      const hue  = hues[Math.abs(room.name.charCodeAt(0)) % hues.length];

      card.innerHTML = `
        <div class="absolute -right-6 -top-6 w-24 h-24 bg-${hue}-50 rounded-full z-0"></div>
        <div class="relative z-10">
          <div class="flex justify-between items-start mb-4">
            <div class="bg-${hue}-100 text-${hue}-600 px-3 py-1 rounded-xl text-sm font-bold flex items-center gap-2">
              <span class="w-2.5 h-2.5 rounded-full bg-${hue}-500 ${isFull ? '' : 'animate-pulse'}"></span>
              ${isFull ? 'Llena' : 'En vivo'}
            </div>
            <span class="text-slate-400 text-sm font-bold">${room.userCount}/${room.maxUsers}</span>
          </div>
          <h3 class="text-xl font-extrabold text-slate-800 mb-2">${room.name}</h3>
          <p class="text-slate-500 font-semibold text-sm mb-6">${room.description || 'Sin descripción.'}</p>
          <div class="flex -space-x-4">
            ${room.users.slice(0,5).map(u =>
              `<img src="https://api.dicebear.com/7.x/notionists/svg?seed=${u.avatarSeed}&backgroundColor=${u.avatarBg}"
                    class="w-12 h-12 rounded-full border-4 border-white shadow-sm"
                    title="${u.username}">`
            ).join('')}
          </div>
          <button class="mt-5 w-full ${isFull ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-orange-100 hover:bg-orange-200 text-orange-700'} rounded-2xl py-2.5 font-bold text-sm transition"
                  ${isFull ? 'disabled' : ''} data-join="${room.id}">
            ${isFull ? '🔒 Sala llena' : '🚀 Entrar'}
          </button>
        </div>`;
      grid.appendChild(card);
    });

    // Join buttons
    document.querySelectorAll('[data-join]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        joinRoom(btn.dataset.join);
      });
    });
  }

  // ─── Join room ───────────────────────────────────────────────────────────
  function joinRoom(roomId) {
    socket.emit('room:join', {
      roomId,
      username:   MY.username,
      avatarSeed: MY.avatarSeed,
      avatarBg:   MY.avatarBg
    }, (res) => {
      if (res.error) return alert(res.error);
      // Navigate to the 3-D room page
      window.location.href = `/room.html?id=${roomId}&sid=${socket.id}`;
    });
  }

  // ─── Create room modal ───────────────────────────────────────────────────
  const overlay  = document.getElementById('modal-overlay');
  const box      = document.getElementById('modal-box');
  const errEl    = document.getElementById('modal-error');

  function openModal() {
    overlay.classList.remove('opacity-0','pointer-events-none');
    setTimeout(() => {
      box.classList.remove('scale-95','opacity-0');
    }, 10);
  }
  function closeModal() {
    box.classList.add('scale-95','opacity-0');
    setTimeout(() => overlay.classList.add('opacity-0','pointer-events-none'), 200);
    errEl.classList.add('hidden');
  }

  document.getElementById('btn-create').addEventListener('click', openModal);
  document.getElementById('btn-modal-cancel').addEventListener('click', closeModal);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

  document.getElementById('btn-modal-create').addEventListener('click', () => {
    const name   = document.getElementById('inp-name').value.trim();
    const desc   = document.getElementById('inp-desc').value.trim();
    const max    = document.getElementById('inp-max').value;

    if (!name) {
      errEl.textContent = '⚠️ El nombre no puede estar vacío.';
      errEl.classList.remove('hidden');
      return;
    }

    socket.emit('room:create', { name, description: desc, maxUsers: max }, (res) => {
      if (res.error) {
        errEl.textContent = res.error;
        errEl.classList.remove('hidden');
        return;
      }
      closeModal();
      document.getElementById('inp-name').value = '';
      document.getElementById('inp-desc').value = '';
      // Auto-enter the room we just created
      joinRoom(res.id);
    });
  });
  </script>
</body>
</html>
