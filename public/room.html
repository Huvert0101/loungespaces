<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lounge Spaces – Sala</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap');
    * { box-sizing: border-box; margin: 0; }
    body { font-family: 'Nunito', sans-serif; background: #0f0f1a; overflow: hidden; }
    #canvas-container { position: fixed; inset: 0; }
    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
    .nametag { position: absolute; transform: translate(-50%, -100%); background: rgba(255,255,255,.85); backdrop-filter: blur(6px); padding: 3px 10px; border-radius: 99px; font-size: 12px; font-weight: 800; color: #334155; white-space: nowrap; pointer-events: none; transition: opacity .2s; }
    .nametag.speaking { background: rgba(251,146,60,.9); color: #fff; }
    #bottombar { position: fixed; bottom: 0; left: 0; right: 0; pointer-events: auto; z-index: 20; display: flex; align-items: center; justify-content: center; gap: 12px; padding: 16px 24px; background: linear-gradient(to top, rgba(15,15,30,.95) 0%, transparent 100%); }
    .ctrl-btn { width: 52px; height: 52px; border-radius: 50%; border: none; cursor: pointer; font-size: 22px; display: flex; align-items: center; justify-content: center; transition: transform .15s, background .15s; box-shadow: 0 4px 20px rgba(0,0,0,.4); }
    .ctrl-btn:hover { transform: scale(1.1); }
    .btn-mic { background: #22c55e; } .btn-mic.muted { background: #ef4444; } .btn-leave { background: #f97316; }
    #room-label { position: fixed; top: 18px; left: 20px; z-index: 20; background: rgba(255,255,255,.1); backdrop-filter: blur(10px); color: #fff; padding: 8px 18px; border-radius: 99px; font-weight: 800; font-size: 15px; }
    #sidebar { position: fixed; top: 64px; right: 16px; z-index: 20; display: flex; flex-direction: column; gap: 8px; }
    .user-chip { background: rgba(255,255,255,.1); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,.15); border-radius: 99px; padding: 6px 12px 6px 6px; display: flex; align-items: center; gap: 8px; color: #fff; font-size: 13px; }
    .mic-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; } .mic-dot.muted { background: #ef4444; }
    #loading { position: fixed; inset: 0; z-index: 50; background: #0f0f1a; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; }
  </style>
</head>
<body>
  <div id="loading"><div class="spinner"></div><p>Entrando a la sala…</p></div>
  <div id="canvas-container"></div>
  <div id="hud"></div>
  <div id="room-label">🛋️ <span id="lbl-room-name">Cargando…</span></div>
  <div id="sidebar"></div>
  <div id="bottombar">
    <button class="ctrl-btn btn-mic" id="btn-mic">🎤</button>
    <button class="ctrl-btn btn-leave" id="btn-leave">🚪</button>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const ROOM_ID = params.get('id');
    const MY = JSON.parse(localStorage.getItem('cozy_me') || '{}');
    const socket = io();
    let muted = false, localStream = null, peers = {};

    // ── CONFIGURACIÓN PODCAST ──
    const SEAT_POSITIONS = [
      { x: -1.5, z: -1.2 }, { x: 1.5, z: -1.2 }, 
      { x: -1.5, z:  1.2 }, { x: 1.5, z:  1.2 }
    ];

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f0f1a);
    const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(4, 2.5, 6);
    camera.lookAt(0, 0.5, 0);

    scene.add(new THREE.AmbientLight(0x333344, 0.5));
    const studioLight = new THREE.PointLight(0xffb380, 2, 10);
    studioLight.position.set(0, 3, 0);
    scene.add(studioLight);

    // Mesa
    const table = new THREE.Mesh(new THREE.BoxGeometry(4, 0.15, 2), new THREE.MeshLambertMaterial({ color: 0x2d1b14 }));
    table.position.y = 0.4;
    scene.add(table);

    // Sillas
    function makeChair(x, z) {
      const g = new THREE.Group();
      g.position.set(x, 0, z);
      g.rotation.y = z < 0 ? 0 : Math.PI;
      const mat = new THREE.MeshLambertMaterial({ color: 0x4a3a30 });
      const seat = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.1, 0.6), mat);
      seat.position.y = 0.3;
      g.add(seat);
      const back = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.5, 0.1), mat);
      back.position.set(0, 0.6, -0.25);
      g.add(back);
      return g;
    }
    SEAT_POSITIONS.forEach(pos => scene.add(makeChair(pos.x, pos.z)));

    // Avatares
    const avatarObjs = {};
    function makeAvatar(user) {
      const g = new THREE.Group();
      const col = parseInt(user.avatarBg?.replace('#','') || 'ffdfbf', 16);
      const mat = new THREE.MeshLambertMaterial({ color: col });
      const body = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.14, 0.42, 12), mat);
      body.position.y = 0.21; g.add(body);
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), mat);
      head.position.y = 0.55; g.add(head);
      const ring = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.025, 8, 32), new THREE.MeshLambertMaterial({ color: 0xf97316 }));
      ring.position.y = 0.55; ring.rotation.x = Math.PI/2; ring.visible = false; ring.name = 'ring';
      g.add(ring);
      return g;
    }

    function placeAvatar(user) {
      if (avatarObjs[user.id]) return;
      const seat = SEAT_POSITIONS[user.seatIndex] || SEAT_POSITIONS[0];
      const group = makeAvatar(user);
      group.position.set(seat.x, 0.48, seat.z);
      scene.add(group);
      const tag = document.createElement('div');
      tag.className = 'nametag';
      tag.textContent = user.username;
      document.getElementById('hud').appendChild(tag);
      avatarObjs[user.id] = { group, tag };
    }

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
      const w = renderer.domElement.clientWidth, h = renderer.domElement.clientHeight;
      const projVec = new THREE.Vector3();
      Object.entries(avatarObjs).forEach(([id, obj]) => {
        projVec.set(obj.group.position.x, obj.group.position.y + 0.85, obj.group.position.z).project(camera);
        obj.tag.style.left = (projVec.x * .5 + .5) * w + 'px';
        obj.tag.style.top = (-.5 * projVec.y + .5) * h + 'px';
      });
    }
    animate();

    // Socket Logic (Mantener igual que antes)
    socket.on('connect', () => {
      socket.emit('room:join', { roomId: ROOM_ID, username: MY.username, avatarSeed: MY.avatarSeed, avatarBg: MY.avatarBg }, (res) => {
        document.getElementById('lbl-room-name').textContent = res.room.name;
        document.getElementById('loading').style.display = 'none';
        initMedia();
        placeAvatar(res.you);
        res.room.users.forEach(u => u.id !== socket.id && placeAvatar(u));
      });
    });

    async function initMedia() { 
      try { localStream = await navigator.mediaDevices.getUserMedia({ audio: true }); } catch(e) {} 
    }
    document.getElementById('btn-leave').onclick = () => { socket.emit('room:leave'); location.href = '/'; };
  </script>
</body>
</html>
